<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniCatch | Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; }
        .glass-panel { background-color: #111827; border: 1px solid #1F2937; }
    </style>
</head>
<body class="text-gray-200 font-sans min-h-screen antialiased p-6">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="flex items-center justify-between border-b border-gray-800 pb-5">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white text-sm">🔒</div>
                <div>
                    <h1 class="text-xl font-black tracking-wider text-white uppercase">OmniCatch Core</h1>
                    <p class="text-xs text-gray-500">Waitlist Operations Portal</p>
                </div>
            </div>
            <button onclick="fetchWaitlistData()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs px-4 py-2 rounded-lg transition-all">
                🔄 Refresh Ledger
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass-panel p-5 rounded-xl">
                <div class="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Total Registered Leads</div>
                <div id="totalCounter" class="text-3xl font-black text-blue-500 mt-1">...</div>
            </div>
            <div class="glass-panel p-5 rounded-xl flex items-center justify-between">
                <div>
                    <div class="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Database Link Status</div>
                    <div class="text-sm font-bold text-emerald-400 mt-1 flex items-center gap-1.5">
                        <span class="h-2 w-2 rounded-full bg-emerald-400 inline-block animate-pulse"></span> Connected
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel rounded-xl overflow-hidden shadow-2xl">
            <div class="px-5 py-4 bg-gray-950/40 border-b border-gray-800 flex justify-between items-center">
                <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400">Waitlist Email Registry Ledger</h3>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-950/20 text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-800">
                            <th class="px-6 py-3 font-bold">Index ID</th>
                            <th class="px-6 py-3 font-bold">User Email Address</th>
                            <th class="px-6 py-3 font-bold">Registration Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="ledgerRows" class="divide-y divide-gray-850 text-xs text-gray-300">
                        <tr>
                            <td colspan="3" class="px-6 py-8 text-center text-gray-500 font-medium">Initializing secure connection pipeline...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://evavclthprtdtimjqjsu.supabase.co/rest/v1/waitlist?select=*";
        const SUPABASE_KEY = "sb_publishable_qjXSIkHzTVST8UOgZz-E2Q_MhyYsCqG";

        async function fetchWaitlistData() {
            const rowsContainer = document.getElementById('ledgerRows');
            const counterContainer = document.getElementById('totalCounter');
            
            try {
                const response = await fetch(SUPABASE_URL, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Update total user load metric
                    counterContainer.innerText = data.length;
                    
                    // Clear loading state
                    rowsContainer.innerHTML = '';
                    
                    if (data.length === 0) {
                        rowsContainer.innerHTML = `
                            <tr>
                                <td colspan="3" class="px-6 py-8 text-center text-gray-500">Spreadsheet table is currently empty. No leads captured yet.</td>
                            </tr>`;
                        return;
                    }

                    // Render matching table arrays
                    data.forEach((row, index) => {
                        const dateFormatted = new Date(row.created_at).toLocaleString();
                        rowsContainer.innerHTML += `
                            <tr class="hover:bg-gray-900/30 transition-colors">
                                <td class="px-6 py-3.5 font-mono text-gray-500">${row.id || index + 1}</td>
                                <td class="px-6 py-3.5 text-white font-medium">${row.email}</td>
                                <td class="px-6 py-3.5 text-gray-400 font-mono">${dateFormatted}</td>
                            </tr>`;
                    });

                } else {
                    rowsContainer.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-400">Failed to fetch data matrix. Verify access tokens.</td></tr>`;
                }
            } catch (err) {
                rowsContainer.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-red-400">Connection timeout. Check web network links.</td></tr>`;
            }
        }

        // Auto initialization on load
        window.onload = fetchWaitlistData;
    </script>
</body>
</html>
