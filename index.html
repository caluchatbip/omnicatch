/* ---------------------- RETURN CONTRACT HELPER ---------------------- */

  // =====================================================
// BUSINESS SCHEMA v2.1

// =====================================================
// BUSINESS DATABASE VALIDATOR (Enhanced v0.5.3)
// =====================================================
const businessValidatorEngine = (() => {
  // Allowed values for future-proof validation loops
  const VALID_CATEGORIES = new Set(["Digital Products", "Freelancing", "Micro SaaS", "AI Tools", "Education", "Creator Economy", "E-commerce", "Local Services", "Mobile Apps", "Agency"]);
  const VALID_MODELS = new Set(["Service", "Product", "SaaS", "Subscription", "Marketplace", "Affiliate", "Education", "Creator"]);
  const VALID_INCOME_TYPES = new Set(["One-time", "Monthly", "Recurring", "Commission", "Advertising", "Hybrid"]);

  function validateDatabase(db) {
    const validRecords = [];
    const invalidRecords = [];
    const errors = [];
    const warnings = [];
    const knownIds = new Set();
    const knownTitles = new Set();

    const requiredFields = [
      "id", "title", "category", "subcategory", "description", "budgetTierRange",
      "startupCostBaseINR", "startupCostUSD", "recurringCostBaseINR", "recurringCostUSD",
      "difficulty", "marketDemandBase", "competitionBase", "scalabilityBase",
      "estimatedMarginBase", "estimatedTimelineBase", "requiredSkills", "recommendedCountries",
      "riskFactors", "advantages", "disadvantages", "idealFor", "businessModel",
      "incomeType", "requiredTools", "roadmapId", "version", "metadata"
    ];

    db.forEach((entry, index) => {
      let hasError = false;
      const entryId = entry.id || `Index-${index}`;

      // 1. Missing Fields Check
      requiredFields.forEach(field => {
        if (entry[field] === undefined || entry[field] === null) {
          errors.push(`[Error] Record ${entryId} is missing property: "${field}"`);
          hasError = true;
        }
      });

      // 2. Structural Integrity & Value Boundary Rules
      if (entry.id) {
        if (knownIds.has(entry.id)) {
          errors.push(`[Error] Duplicate Identifier: "${entry.id}"`);
          hasError = true;
        }
        knownIds.add(entry.id);
      }

      if (entry.title) {
        if (knownTitles.has(entry.title)) {
          warnings.push(`[Warning] Duplicate Title detected: "${entry.title}"`);
        }
        knownTitles.add(entry.title);
      }

      if (entry.startupCostBaseINR < 0 || entry.recurringCostBaseINR < 0 || entry.startupCostUSD < 0 || entry.recurringCostUSD < 0) {
        errors.push(`[Error] Record ${entryId} contains negative cost definitions`);
        hasError = true;
      }

      // 3. String Enum Constraints Verification
      if (entry.category && !VALID_CATEGORIES.has(entry.category)) {
        errors.push(`[Error] Record ${entryId} has unknown category: "${entry.category}"`);
        hasError = true;
      }

      if (entry.businessModel && !VALID_MODELS.has(entry.businessModel)) {
        errors.push(`[Error] Record ${entryId} has unknown businessModel: "${entry.businessModel}"`);
        hasError = true;
      }

      if (entry.incomeType && !VALID_INCOME_TYPES.has(entry.incomeType)) {
        errors.push(`[Error] Record ${entryId} has unknown incomeType: "${entry.incomeType}"`);
        hasError = true;
      }

      // 4. Empty Array Validations
      ["requiredSkills", "recommendedCountries", "riskFactors", "advantages", "disadvantages", "requiredTools"].forEach(arrField => {
        if (Array.isArray(entry[arrField]) && entry[arrField].length === 0) {
          errors.push(`[Error] Record ${entryId} contains empty array: "${arrField}"`);
          hasError = true;
        }
      });

      // Split record into appropriate pipeline bucket
      if (hasError) {
        invalidRecords.push(entry);
      } else {
        validRecords.push(entry);
      }
    });

    // Calculate Data Health Score out of 100%
    const totalRecords = db.length;
    const healthScore = totalRecords > 0 ? Math.round((validRecords.length / totalRecords) * 100) : 0;

    // Display The Validation Report Dashboard Logs (Rule Contract)
    console.log("=====================================================");
    console.log("DATABASE VALIDATION REPORT");
    console.log("=====================================================");
    console.log(`* Records Processed : ${totalRecords}`);
    console.log(`* Records Passed    : ${validRecords.length}`);
    console.log(`* Records Failed    : ${invalidRecords.length}`);
    console.log(`* Database Health   : ${healthScore}%`);
    console.log("=====================================================");

    return makeResult(errors.length === 0, {
      validRecords,
      invalidRecords,
      healthScore
    }, errors, warnings);
  }

  return { validateDatabase };
})();

const stateEngine = (() => {
  let _state = {

    budget: 15000,

    recentSearches: [],

    activeTab: "dashboard",
    notification: null
  };
  const listeners = new Set();

  function getState() { return { ..._state }; }

  function setState(patch) {
    _state = { ..._state, ...patch };
    listeners.forEach(fn => fn(getState()));
    return makeResult(true, getState());
  }

  function subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); }

  return { getState, setState, subscribe };
})();

/* ==================================================================
   EVENT BUS — decouples engines/components from each other
   ================================================================== */
const eventBus = (() => {
  const handlers = {};
  function on(evt, fn) {
    (handlers[evt] = handlers[evt] || []).push(fn);
    return () => { handlers[evt] = handlers[evt].filter(h => h !== fn); };
  }
  function emit(evt, payload) {
    (handlers[evt] || []).forEach(fn => fn(payload));
    return makeResult(true, { evt, payload });
  }
  return { on, emit };
})();

/* ==================================================================
   THEME ENGINE
   ================================================================== */
const themeEngine = (() => {
  function apply(theme) {
    document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
    return makeResult(true, { theme });
  }
  function toggle() {
    const next = stateEngine.getState().theme === "dark" ? "light" : "dark";
    apply(next);
    storageEngine.set("theme", next);
    stateEngine.setState({ theme: next });
    return makeResult(true, { theme: next });
  }
  function init() {
    const saved = storageEngine.get("theme").data.value || "dark";
    apply(saved);
    stateEngine.setState({ theme: saved });
    return makeResult(true, { theme: saved });
  }
  return { apply, toggle, init };
})();

/* ==================================================================
   STORAGE ENGINE — thin, safe localStorage wrapper
   ================================================================== */
const storageEngine = (() => {
  const map = {
    recentSearches: CONFIG.storageKeys.recentSearches,
    history: CONFIG.storageKeys.history,
    bookmarks: CONFIG.storageKeys.bookmarks,
    country: CONFIG.storageKeys.country,
    theme: CONFIG.storageKeys.theme
  };
  function get(key) {
    try {
      const raw = localStorage.getItem(map[key] || key);
      return makeResult(true, { value: raw ? JSON.parse(raw) : null });
    } catch (e) {
      return makeResult(false, {}, [String(e)]);
    }
  }
  function set(key, value) {
    try {
      localStorage.setItem(map[key] || key, JSON.stringify(value));
      return makeResult(true, { value });
    } catch (e) {
      return makeResult(false, {}, [String(e)]);
    }
  }
  function pushCapped(key, item, cap, uniqueBy) {
    const current = get(key).data.value || [];
    let next = uniqueBy ? current.filter(x => x[uniqueBy] !== item[uniqueBy]) : current;
    next = [item, ...next].slice(0, cap);
    set(key, next);
    return makeResult(true, { value: next });
  }
  return { get, set, pushCapped };
})();

/* ==================================================================
   ANALYTICS ENGINE — local-only event tracking (no network calls)

    const entry = { eventName, payload, ts: Date.now() };
    const log = storageEngine.get(LOG_KEY).data.value || [];
    log.push(entry);
    storageEngine.set(LOG_KEY, log.slice(-200));
    return makeResult(true, entry);
  }
  return { track };
})();

// =====================================================
// SCORING PIPELINE
// =====================================================
const scoringEngine = (() => {
  const _scoreCache = new Map();

  function calculateOpportunityScore(business, activeBudget, activeCountry, profileKey = "Balanced") {
    const registryEntry = DECISION_PROFILE_REGISTRY[profileKey] || DECISION_PROFILE_REGISTRY.Balanced;
    const profileWeights = registryEntry.weights;
    
    const cacheKey = `${business.id}_${activeBudget}_${activeCountry}_${profileKey}`;
    if (_scoreCache.has(cacheKey)) {
      return _scoreCache.get(cacheKey);
    }

    // Layer 1 & 3: Metric Collection and 0-100 Shift Processing
    const rawMetrics = {
      demand: business.marketDemandBase,
      competition: 100 - business.competitionBase,
      margin: business.estimatedMarginBase,
      scalability: business.scalabilityBase,
      budgetFit: calculateBudgetFitFactor(business.budgetTierRange, activeBudget),
      countryFit: business.recommendedCountries.includes(activeCountry) ? 100 : 40
    };

    // Layer 2: Compute Weighted Profile Value Array Matrix
    let overallScore = 0;
    const debuggingMap = {};

    Object.keys(profileWeights).forEach(metricKey => {
      const weight = profileWeights[metricKey];
      const normalizedValue = rawMetrics[metricKey];
      const partialScore = normalizedValue * weight;
      
      overallScore += partialScore;
      debuggingMap[metricKey] = {
        raw: normalizedValue,
        weight: weight,
        contribution: parseFloat(partialScore.toFixed(2))
      };
    });

    overallScore = Math.round(overallScore);

    // Advanced Data Integrity Evaluation Loop for Confidence Metrics
    const confidenceScore = evaluateDataConfidence(business, rawMetrics);
    const reasoningReport = generateStructuredReasoning(rawMetrics);

    // =====================================================
    // DECISION OUTPUT CONTRACT
    // =====================================================
    const evaluationEnvelope = {
      overallScore: overallScore,
      confidence: `${confidenceScore}%`,
      profile: {
        id: registryEntry.id,
        name: registryEntry.name
      },
      metrics: rawMetrics,
      strengths: reasoningReport.strengths,
      weaknesses: reasoningReport.weaknesses,
      reasoning: `Highly viable option tuned for ${registryEntry.targetAudience} parameters.`,
      metadata: {
        algorithmVersion: "2.1.0",
        profileId: registryEntry.id,
        simulated: true
      }
    };

    if (DEBUG_SCORING) {
      evaluationEnvelope._debugDiagnostics = {

/* ==================================================================
   DETERMINISTIC HASH — powers the simulation engine.
   Same inputs → same outputs, always. No Math.random() anywhere.
   ================================================================== */
function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return Math.abs(h);
}
function seededValue(seedStr, min, max) {
  const h = hashString(seedStr);
  return min + (h % (max - min + 1));
}

/* ==================================================================
   SEARCH ENGINE — normalization, synonyms, typo tolerance
   ================================================================== */
const searchEngine = (() => {
  const SYNONYMS = {
    "ring": ["smart ring","wearable","gadget"],
    "wearable": ["smart ring","ring","gadget"],
    "ai": ["gpt","prompts","ai tools"],
    "app": ["mobile","application"],
    "course": ["education","cohort","exam"],
    "shop": ["ecommerce","dropship","store"],
    "content": ["creator","youtube","shorts"]
  };

  function normalize(str) {
    return String(str || "").toLowerCase().trim().replace(/[^a-z0-9\s]/g, "");
  }

  // Levenshtein distance, capped, for typo tolerance
  function editDistance(a, b) {
    const dp = Array.from({ length: a.length + 1 }, (_, i) => [i, ...Array(b.length).fill(0)]);
    for (let j = 0; j <= b.length; j++) dp[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        dp[i][j] = a[i - 1] === b[j - 1]
          ? dp[i - 1][j - 1]
          : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
      }
    }
    return dp[a.length][b.length];
  }

  function expandTokens(tokens) {
    const expanded = new Set(tokens);
    tokens.forEach(t => (SYNONYMS[t] || []).forEach(s => expanded.add(normalize(s))));
    return [...expanded];
  }

  function scoreEntry(entry, tokens) {
    const haystack = normalize([entry.title, entry.category, ...entry.tags].join(" "));
    let score = 0;
    tokens.forEach(token => {
      if (!token) return;
      if (haystack.includes(token)) { score += 10; return; }
      // typo tolerance: check each haystack word within edit distance 2
      const words = haystack.split(/\s+/);
      const close = words.some(w => w.length > 2 && editDistance(w, token) <= 2);
      if (close) score += 5;
    });
    return score;
  }

  function search(query, category = "All") {
    const q = normalize(query);
    const tokens = expandTokens(q.split(/\s+/).filter(Boolean));
    let pool = BUSINESS_DB.filter(b => category === "All" || b.category === category);
    if (tokens.length === 0) return makeResult(true, { results: pool, matched: false });
    const scored = pool
      .map(entry => ({ entry, score: scoreEntry(entry, tokens) }))
      .filter(r => r.score > 0)
      .sort((a, b) => b.score - a.score);
    const results = scored.length ? scored.map(r => r.entry) : pool; // graceful fallback
    return makeResult(true, { results, matched: scored.length > 0 });
  }

  return { search, normalize };
})();
  /* ==================================================================
   SCORING ENGINE — deterministic simulated metrics per business
   ================================================================== */
const scoringEngine = (() => {
  function scoreBusiness(entry, { query, budget, country, category }) {
    const seed = `${entry.id}|${normalize2(query)}|${budget}|${country}|${category}`;
    const demandJitter = seededValue(seed + "demand", -8, 8);
    const competitionJitter = seededValue(seed + "comp", -8, 8);
    const marginJitter = seededValue(seed + "margin", -6, 6);

    const profile = getCountryProfile(country);
    const modifiers = applyCountryModifiers(entry, profile, seed);
    const demand = modifiers.demand;
    const competition = modifiers.competition;
    
    const estimatedMargin = clamp(entry.baseMargin + marginJitter, 5, 95);

    const budgetFit = budgetFitScore(entry.budgetRange, budget);
    // Composite score: demand up, competition down, margin up, budget fit up
    const composite = (demand * 0.35) + ((100 - competition) * 0.25) + (estimatedMargin * 0.25) + (budgetFit * 0.15);
  // =====================================================
  // COUNTRY SCORING ADJUSTMENTS
  // =====================================================
  function getCountryProfile(countryName) {
    const keys = Object.keys(CONFIG.countries);
    const matchKey = keys.find(k => CONFIG.countries[k].name === countryName);
    return matchKey ? CONFIG.countries[matchKey] : CONFIG.countries["IN"];
  }

  function applyCountryModifiers(entry, profile, seed) {
    const jDemand = seededValue(seed + "c_dem", -5, 5);
    const jComp = seededValue(seed + "c_cmp", -6, 6);
    const demand = clamp((entry.baseDemand * profile.purchasingPowerIndex / 100) + jDemand, 5, 99);
    const competition = clamp((entry.baseCompetition * profile.averageCPM) + jComp, 5, 99);
    return { demand, competition };
  }

  return { scoreBusiness, clamp, getCountryProfile, applyCountryModifiers };
})();
  

  function budgetFitScore(range, budget) {
    const [min, max] = range;
    if (budget >= min && budget <= max) return 100;
    if (budget < min) return clamp(100 - ((min - budget) / (min || 1)) * 100, 0, 100);
    return clamp(100 - ((budget - max) / (max || 1)) * 60, 0, 100);
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function normalize2(s) { return searchEngine.normalize(s); }

  return { scoreBusiness, clamp };
})();

  }

  function toggleSystemLoader(show) {
    const loader = document.getElementById(ELEMENT_IDS.loaderOverlay);
    if (!loader) return;
    loader.style.display = show ? "flex" : "none";
    loader.setAttribute("aria-hidden", (!show).toString());
  }

  function triggerGlobalNotification(message, tone = "info") {
    const bar = document.getElementById(ELEMENT_IDS.notificationArea);
    if (!bar) return;
    
    bar.className = `notification-toast tone-${tone}`;
    bar.innerText = message;
    bar.style.opacity = "1";
    
    // Auto clear safety loop to prevent stale notification states
    setTimeout(() => {
      bar.style.opacity = "0";
      stateEngine.setState({ notification: null });
    }, 4000);
  }

  function generateEmptyStateTemplate() {
    return `
      <div class="ui-empty-state" role="status">
        <p class="empty-title">No Recommendations Available</p>
        <p class="empty-subtitle">Adjust your target budget or operational region filter parameters to analyze options.</p>
      </div>
    `;
  }

  function generateRecommendationsGrid(results, state) {
    return results.map(item => {
      // Consume the standardized version 0.6.1 scoring contract dynamically
      const evaluation = scoringEngine.calculateOpportunityScore(item, state.budget, state.country).data;
      
      return `
        <div class="business-card-node" tabindex="0">
          <div class="card-header">
            <h3>${item.title}</h3>
            <span class="badge-score">${evaluation.overallScore}/100</span>
          </div>
          <p class="card-desc">${item.description}</p>
          <div class="metrics-pill-row">
            <span>💡 Confidence: ${evaluation.confidence}</span>
            <span>📊 Profile: ${evaluation.profile.name}</span>
          </div>
          <div class="reasoning-block">
            <strong>Strengths:</strong>
            <ul>${evaluation.strengths.map(s => `<li>${s}</li>`).join("")}</ul>
          </div>
        </div>
      `;
    }).join("");
  }

  return { render };
})();


function triggerAnalysis(forcedQuery) {
  const s = stateEngine.getState();
  const query = forcedQuery ?? document.getElementById("query-input")?.value ?? s.query;
  stateEngine.setState({ isAnalyzing: true, query });
  uiEngine.render();

  analyticsEngine.track("searchPerformed", { query, budget: s.budget, country: s.country, category: s.activeCategory });

  // simulate a short async compute step so skeleton loaders are meaningful
  setTimeout(() => {
    const result = simulationEngine.runAnalysis({ query, budget: s.budget, country: s.country, category: s.activeCategory }).data;
    storageEngine.pushCapped("recentSearches", query, CONFIG.limits.recentSearches);
    storageEngine.pushCapped("history", result, CONFIG.limits.history, "generatedAt");
    stateEngine.setState({
      isAnalyzing: false,
      lastResult: result,
      recentSearches: (storageEngine.get("recentSearches").data.value || []).filter(Boolean),
      history: storageEngine.get("history").data.value || []
    });
    uiEngine.render();
  }, 350);
}

function toggleBookmark(id) {
  const s = stateEngine.getState();
  if (!s.lastResult) return;
  const rec = s.lastResult.recommendations.find(r => r.id === id) || s.bookmarks.find(r => r.id === id);
  if (!rec) return;
  const exists = s.bookmarks.some(b => b.id === id);
  const nextBookmarks = exists ? s.bookmarks.filter(b => b.id !== id) : [rec, ...s.bookmarks];
  storageEngine.set("bookmarks", nextBookmarks);
  stateEngine.setState({ bookmarks: nextBookmarks });
  if (!exists) analyticsEngine.track("bookmarkAdded", { id });
  uiEngine.render();
}

/* ==================================================================
   INITIALIZATION
   ================================================================== */
 function init() {
  // Execute database evaluation and log metrics smoothly into centralized app state
  const validationResult = businessValidatorEngine.validateDatabase(BUSINESS_DB);
  
  const country = storageEngine.get("country").data.value || "India";
  const recentSearches = (storageEngine.get("recentSearches").data.value || []).filter(Boolean);
  const history = storageEngine.get("history").data.value || [];
  const bookmarks = storageEngine.get("bookmarks").data.value || [];

  stateEngine.setState({
    databaseReport: validationResult.data.reportSummary,
    country,
    recentSearches,
    history,
    bookmarks
  });

  // Output formal verification summary report directly to the development environment
  console.log("=====================================================");
  console.log("DATABASE VALIDATION REPORT");
  console.log("=====================================================");
  console.log(`* Status Locked     : ${validationResult.success ? "PASSED" : "FAILED"}`);
  console.log(`* Integrity Score   : ${validationResult.data.reportSummary.healthScore}%`);
  console.log("=====================================================");

  themeEngine.init();
  routingEngine.init();
  stateEngine.subscribe(() => {}); // reserved for future cross-module reactions
  uiEngine.render();
 }
  

document.addEventListener("DOMContentLoaded", init);
</script>
