/* ---------------------- RETURN CONTRACT HELPER ---------------------- */
function makeResult(success, data = {}, errors = [], warnings = []) {
  return { success, data, errors, warnings };
}
  /* ==================================================================
   STATE — single immutable-by-convention store
   ================================================================== */
const stateEngine = (() => {
  let _state = {
    theme: "dark",
    country: "India",
    budget: 15000,
    query: "",
    activeCategory: "All",
    isAnalyzing: false,
    lastResult: null,
    recentSearches: [],
    history: [],
    bookmarks: [],
    activeModal: null,     // { type, payload }
    activeTab: "dashboard",
    notification: null
  };
  const listeners = new Set();

  function getState() { return { ..._state }; }

  function setState(patch) {
    _state = { ..._state, ...patch };
    listeners.forEach(fn => fn(getState()));
    return makeResult(true, getState());
  }

  function subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); }

  return { getState, setState, subscribe };
})();

/* ==================================================================
   EVENT BUS — decouples engines/components from each other
   ================================================================== */
const eventBus = (() => {
  const handlers = {};
  function on(evt, fn) {
    (handlers[evt] = handlers[evt] || []).push(fn);
    return () => { handlers[evt] = handlers[evt].filter(h => h !== fn); };
  }
  function emit(evt, payload) {
    (handlers[evt] || []).forEach(fn => fn(payload));
    return makeResult(true, { evt, payload });
  }
  return { on, emit };
})();

/* ==================================================================
   THEME ENGINE
   ================================================================== */
const themeEngine = (() => {
  function apply(theme) {
    document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
    return makeResult(true, { theme });
  }
  function toggle() {
    const next = stateEngine.getState().theme === "dark" ? "light" : "dark";
    apply(next);
    storageEngine.set("theme", next);
    stateEngine.setState({ theme: next });
    return makeResult(true, { theme: next });
  }
  function init() {
    const saved = storageEngine.get("theme").data.value || "dark";
    apply(saved);
    stateEngine.setState({ theme: saved });
    return makeResult(true, { theme: saved });
  }
  return { apply, toggle, init };
})();

/* ==================================================================
   STORAGE ENGINE — thin, safe localStorage wrapper
   ================================================================== */
const storageEngine = (() => {
  const map = {
    recentSearches: CONFIG.storageKeys.recentSearches,
    history: CONFIG.storageKeys.history,
    bookmarks: CONFIG.storageKeys.bookmarks,
    country: CONFIG.storageKeys.country,
    theme: CONFIG.storageKeys.theme
  };
  function get(key) {
    try {
      const raw = localStorage.getItem(map[key] || key);
      return makeResult(true, { value: raw ? JSON.parse(raw) : null });
    } catch (e) {
      return makeResult(false, {}, [String(e)]);
    }
  }
  function set(key, value) {
    try {
      localStorage.setItem(map[key] || key, JSON.stringify(value));
      return makeResult(true, { value });
    } catch (e) {
      return makeResult(false, {}, [String(e)]);
    }
  }
  function pushCapped(key, item, cap, uniqueBy) {
    const current = get(key).data.value || [];
    let next = uniqueBy ? current.filter(x => x[uniqueBy] !== item[uniqueBy]) : current;
    next = [item, ...next].slice(0, cap);
    set(key, next);
    return makeResult(true, { value: next });
  }
  return { get, set, pushCapped };
})();

/* ==================================================================
   ANALYTICS ENGINE — local-only event tracking (no network calls)
   ================================================================== */
const analyticsEngine = (() => {
  const LOG_KEY = "oc_analytics_log";
  function track(eventName, payload = {}) {
    const entry = { eventName, payload, ts: Date.now() };
    const log = storageEngine.get(LOG_KEY).data.value || [];
    log.push(entry);
    storageEngine.set(LOG_KEY, log.slice(-200));
    return makeResult(true, entry);
  }
  return { track };
})();

/* ==================================================================
   DETERMINISTIC HASH — powers the simulation engine.
   Same inputs → same outputs, always. No Math.random() anywhere.
   ================================================================== */
function hashString(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return Math.abs(h);
}
function seededValue(seedStr, min, max) {
  const h = hashString(seedStr);
  return min + (h % (max - min + 1));
}

/* ==================================================================
   SEARCH ENGINE — normalization, synonyms, typo tolerance
   ================================================================== */
const searchEngine = (() => {
  const SYNONYMS = {
    "ring": ["smart ring","wearable","gadget"],
    "wearable": ["smart ring","ring","gadget"],
    "ai": ["gpt","prompts","ai tools"],
    "app": ["mobile","application"],
    "course": ["education","cohort","exam"],
    "shop": ["ecommerce","dropship","store"],
    "content": ["creator","youtube","shorts"]
  };

  function normalize(str) {
    return String(str || "").toLowerCase().trim().replace(/[^a-z0-9\s]/g, "");
  }

  // Levenshtein distance, capped, for typo tolerance
  function editDistance(a, b) {
    const dp = Array.from({ length: a.length + 1 }, (_, i) => [i, ...Array(b.length).fill(0)]);
    for (let j = 0; j <= b.length; j++) dp[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        dp[i][j] = a[i - 1] === b[j - 1]
          ? dp[i - 1][j - 1]
          : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
      }
    }
    return dp[a.length][b.length];
  }

  function expandTokens(tokens) {
    const expanded = new Set(tokens);
    tokens.forEach(t => (SYNONYMS[t] || []).forEach(s => expanded.add(normalize(s))));
    return [...expanded];
  }

  function scoreEntry(entry, tokens) {
    const haystack = normalize([entry.title, entry.category, ...entry.tags].join(" "));
    let score = 0;
    tokens.forEach(token => {
      if (!token) return;
      if (haystack.includes(token)) { score += 10; return; }
      // typo tolerance: check each haystack word within edit distance 2
      const words = haystack.split(/\s+/);
      const close = words.some(w => w.length > 2 && editDistance(w, token) <= 2);
      if (close) score += 5;
    });
    return score;
  }

  function search(query, category = "All") {
    const q = normalize(query);
    const tokens = expandTokens(q.split(/\s+/).filter(Boolean));
    let pool = BUSINESS_DB.filter(b => category === "All" || b.category === category);
    if (tokens.length === 0) return makeResult(true, { results: pool, matched: false });
    const scored = pool
      .map(entry => ({ entry, score: scoreEntry(entry, tokens) }))
      .filter(r => r.score > 0)
      .sort((a, b) => b.score - a.score);
    const results = scored.length ? scored.map(r => r.entry) : pool; // graceful fallback
    return makeResult(true, { results, matched: scored.length > 0 });
  }

  return { search, normalize };
})();
  /* ==================================================================
   SCORING ENGINE — deterministic simulated metrics per business
   ================================================================== */
const scoringEngine = (() => {
  function scoreBusiness(entry, { query, budget, country, category }) {
    const seed = `${entry.id}|${normalize2(query)}|${budget}|${country}|${category}`;
    const demandJitter = seededValue(seed + "demand", -8, 8);
    const competitionJitter = seededValue(seed + "comp", -8, 8);
    const marginJitter = seededValue(seed + "margin", -6, 6);

    const demand = clamp(entry.baseDemand + demandJitter, 5, 99);
    const competition = clamp(entry.baseCompetition + competitionJitter, 5, 99);
    const estimatedMargin = clamp(entry.baseMargin + marginJitter, 5, 95);

    const budgetFit = budgetFitScore(entry.budgetRange, budget);
    // Composite score: demand up, competition down, margin up, budget fit up
    const composite = (demand * 0.35) + ((100 - competition) * 0.25) + (estimatedMargin * 0.25) + (budgetFit * 0.15);

    return { demand, competition, estimatedMargin, budgetFit, composite: Math.round(composite) };
  }

  function budgetFitScore(range, budget) {
    const [min, max] = range;
    if (budget >= min && budget <= max) return 100;
    if (budget < min) return clamp(100 - ((min - budget) / (min || 1)) * 100, 0, 100);
    return clamp(100 - ((budget - max) / (max || 1)) * 60, 0, 100);
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function normalize2(s) { return searchEngine.normalize(s); }

  return { scoreBusiness, clamp };
})();

/* ==================================================================
   ROADMAP ENGINE — fixed 4-phase schema for every recommendation

const roadmapEngine = (() => {

        estimatedTime: "3-6 weeks"
      },

        checklist: [

          "Re-run this analysis quarterly as demand/competition shift"
        ],
        expectedCost: `₹${Math.round(entry.budgetRange[1] * 0.5)}+`,
        estimatedTime: "Ongoing"
      }
    ];
  }
  return { buildRoadmap };
})();

/* ==================================================================
   RECOMMENDATION / SIMULATION ORCHESTRATION
   ================================================================== */
const simulationEngine = (() => {
  function runAnalysis({ query, budget, country, category }) {
    const searchRes = searchEngine.search(query, category);
    const pool = searchRes.data.results.length ? searchRes.data.results : BUSINESS_DB;

    const ranked = pool.map(entry => {
      const scores = scoringEngine.scoreBusiness(entry, { query, budget, country, category });
      return {
        id: entry.id,
        title: entry.title,
        category: entry.category,
        budgetRange: entry.budgetRange,
        difficulty: entry.difficulty,
        launchTime: entry.launchTime,
        estimatedMargin: scores.estimatedMargin,
        competition: scores.competition,
        demand: scores.demand,
        roadmap: roadmapEngine.buildRoadmap(entry, budget),
        strengths: buildStrengths(entry, scores),
        weaknesses: buildWeaknesses(entry, scores),
        explanation: buildExplanation(entry, scores, { query, budget }),
        metadata: {
          simulation: true, source: "Simulation", live: false,
          compositeScore: scores.composite, budgetFit: Math.round(scores.budgetFit)
        }
      };
    }).sort((a, b) => b.metadata.compositeScore - a.metadata.compositeScore);

    return makeResult(true, { recommendations: ranked, query, budget, country, category, generatedAt: Date.now() });
  }

  function buildStrengths(entry, s) {
    const out = [];
    if (s.demand > 65) out.push("Strong simulated demand signal");
    if (s.competition < 50) out.push("Comparatively low competition");
    if (s.estimatedMargin > 60) out.push("Healthy simulated margin");
    if (entry.difficulty === "Low") out.push("Low execution difficulty");
    return out.length ? out : ["Fits within a broad range of budgets"];
  }
  function buildWeaknesses(entry, s) {
    const out = [];
    if (s.competition > 70) out.push("High simulated competition");
    if (s.demand < 45) out.push("Demand signal is modest");
    if (entry.difficulty === "High") out.push("Higher execution difficulty");
    if (s.budgetFit < 50) out.push("Budget may be a tight fit for this category");
    return out.length ? out : ["No major simulated weaknesses flagged"];
  }
  function buildExplanation(entry, s, { budget }) {
    return `Ranked using a deterministic simulation of demand (${s.demand}/100), competition (${s.competition}/100) and margin (${s.estimatedMargin}/100) for a ₹${budget.toLocaleString("en-IN")} budget. This is a prototype estimate, not live market data.`;
  }

  return { runAnalysis };
})();

/* ==================================================================
   ROUTING ENGINE — simple hash-based tab router (no page reloads)
   ================================================================== */
const routingEngine = (() => {
  const VALID_TABS = ["dashboard","roadmap","pricing","bookmarks","history","architecture"];
  function navigate(tab) {
    if (!VALID_TABS.includes(tab)) return makeResult(false, {}, [`Unknown tab: ${tab}`]);
    window.location.hash = tab;
    stateEngine.setState({ activeTab: tab });
    return makeResult(true, { tab });
  }
  function init() {
    const fromHash = window.location.hash.replace("#", "");
    const tab = VALID_TABS.includes(fromHash) ? fromHash : "dashboard";
    stateEngine.setState({ activeTab: tab });
    window.addEventListener("hashchange", () => {
      const t = window.location.hash.replace("#", "");
      if (VALID_TABS.includes(t)) stateEngine.setState({ activeTab: t });
    });
    return makeResult(true, { tab });
  }
  return { navigate, init, VALID_TABS };
})();

const Components = {

    };
    const style = variant === "primary" ? `style="background:var(--accent)" onmouseover="this.style.background='var(--accent-hover)'" onmouseout="this.style.background='var(--accent)'"` : "";
    return `<button class="${base} ${sizes[size]} ${variants[variant]}" ${style} ${attrs}>${label}</button>`;
  },
  Badge({ label, tone = "neutral" }) {
    const tones = {
      neutral: "background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)",
      success: "background:rgba(34,197,94,.12);color:var(--success)",
      warning: "background:rgba(234,179,8,.12);color:var(--warning)",
      danger: "background:rgba(239,68,68,.12);color:var(--danger)",

  Card({ content, extraClass = "", padding = "p-5" }) {
    return `<div class="surface ${padding} ${extraClass}">${content}</div>`;
  },
  Input({ id, placeholder, value = "", attrs = "" }) {
    return `<input id="${id}" type="text" value="${escapeHtml(value)}" placeholder="${placeholder}"

  },
  TimelineCard({ phase, objective, checklist, expectedCost, estimatedTime }) {
    return `
      <div class="surface p-4 flex gap-4">
        <div class="flex flex-col items-center">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold" style="background:var(--accent-dim);color:var(--accent)">${phase}</div>

    return Array.from({ length: lines }).map((_, i) =>

};

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;",  '"': "&quot;", "'": "&#39;" }[m]));
}

    const modules = [
      ["themeEngine", "Dark/light theme persistence and application"],
      ["stateEngine", "Single centralized immutable state store"],
      ["eventBus", "Decoupled pub/sub between modules"],
      ["searchEngine", "Fuzzy, synonym-aware, typo-tolerant matching"],
      ["routingEngine", "Hash-based tab navigation"],
      ["scoringEngine", "Deterministic composite scoring"],
      ["roadmapEngine", "4-phase roadmap generation"],
      ["pricingEngine", "Static tier configuration"],
      ["storageEngine", "Safe localStorage read/write wrapper"],
      ["analyticsEngine", "Local-only event tracking"],
      ["uiEngine", "The only module permitted to touch the DOM"]
    ];
    return `
      <div class="grid sm:grid-cols-2 gap-3 mb-6">
        ${modules.map(([name, desc]) => Components.Accordion({ id: name, title: `omniCore.${name}`, bodyHtml: `<p>${desc}</p>` })).join("")}
      </div>
      ${Components.Card({
        content: `
          <h3 class="font-semibold mb-2">What this prototype is honest about</h3>
          <ul class="text-sm text-sec space-y-1.5 list-disc list-inside">
            <li>All demand/competition/margin figures are <strong>deterministic simulations</strong>, not scraped or live data.</li>
            <li>There is currently <strong>no backend</strong> — waitlist and pre-order actions save to this browser's localStorage only.</li>
            <li>No real AI agents, marketplace APIs, or web scraping run behind this interface.</li>
          </ul>
        `
      })}
    `;
  }

  /* ---------- Modal rendering ---------- */
  function renderModal(s) {
    if (s.activeModal.type === "waitlist") {
      return Components.Modal({
        id: "waitlist", title: "Join the waitlist",
        bodyHtml: `
          <p class="text-sm text-sec mb-4">This saves your interest locally in this prototype. There is no live backend yet, so nothing is sent anywhere.</p>
          ${Components.Input({ id: "waitlist-email", placeholder: "you@email.com", attrs: 'type="email" aria-label="Email"' })}
        `,
        footerHtml: `${Components.Button({ label: "Cancel", variant: "ghost", attrs: 'data-modal-close="waitlist"' })}${Components.Button({ label: "Save interest", attrs: 'id="waitlist-submit"' })}`
      });
    }
    return "";
  }

  /* ---------- Trend chart (canvas, no external chart lib) ---------- */
  function renderTrendChart(result) {
    const canvas = document.getElementById("trend-canvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height, pad = 24;
    ctx.clearRect(0, 0, w, h);
    const styles = getComputedStyle(document.documentElement);
    const gridColor = styles.getPropertyValue("--border").trim();
    const lineColor = styles.getPropertyValue("--accent").trim();

    // deterministic 12-point trend derived from top recommendation id + query
    const rec = result.recommendations[0];
    const points = Array.from({ length: 12 }, (_, i) =>
      seededValue(`${rec.id}|trend|${i}|${result.query}`, 20, 95)
    );
    const maxV = 100, minV = 0;
    const stepX = (w - pad * 2) / (points.length - 1);

    // grid
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad + ((h - pad * 2) / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke();
    }
    // line
    ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.beginPath();
    points.forEach((v, i) => {
      const x = pad + stepX * i;
      const y = h - pad - ((v - minV) / (maxV - minV)) * (h - pad * 2);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    // dots
    ctx.fillStyle = lineColor;
    points.forEach((v, i) => {
      const x = pad + stepX * i;
      const y = h - pad - ((v - minV) / (maxV - minV)) * (h - pad * 2);
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    });
  }

  return { render };
})();

/* ==================================================================
   EVENTS — wires DOM interactions to engines. No business logic here.
   ================================================================== */
function bindEvents() {
  const s = stateEngine.getState();

  document.getElementById("theme-toggle")?.addEventListener("click", () => {
    themeEngine.toggle();
    uiEngine.render();
  });

  document.querySelectorAll("[data-nav-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      routingEngine.navigate(btn.dataset.navTab);
      uiEngine.render();
    });
  });

  const budgetSlider = document.getElementById("budget-slider");
  if (budgetSlider) {
    const out = document.getElementById("budget-slider-out");
    const paint = () => { if (out) out.textContent = `₹${Number(budgetSlider.value).toLocaleString("en-IN")}`; };
    paint();
    budgetSlider.addEventListener("input", () => {
      paint();
      stateEngine.setState({ budget: Number(budgetSlider.value) });
      analyticsEngine.track("budgetChanged", { budget: Number(budgetSlider.value) });
    });
  }

  document.getElementById("country-select")?.addEventListener("change", e => {
    stateEngine.setState({ country: e.target.value });
    storageEngine.set("country", e.target.value);
    analyticsEngine.track("countryChanged", { country: e.target.value });
  });

  document.getElementById("category-select")?.addEventListener("change", e => {
    stateEngine.setState({ activeCategory: e.target.value });
  });

  document.getElementById("query-input")?.addEventListener("keydown", e => {
    if (e.key === "Enter") triggerAnalysis();
  });

  document.getElementById("analyze-btn")?.addEventListener("click", triggerAnalysis);

  document.querySelectorAll("[data-recent-search]").forEach(btn => {
    btn.addEventListener("click", () => {
      const q = btn.dataset.recentSearch;
      stateEngine.setState({ query: q });
      triggerAnalysis(q);
    });
  });

  document.querySelectorAll("[data-bookmark-id]").forEach(btn => {
    btn.addEventListener("click", () => toggleBookmark(btn.dataset.bookmarkId));
  });

  document.querySelectorAll("[data-view-roadmap]").forEach(btn => {
    btn.addEventListener("click", () => {
      stateEngine.setState({ roadmapFocusId: btn.dataset.viewRoadmap });
      analyticsEngine.track("roadmapOpened", { id: btn.dataset.viewRoadmap });
      routingEngine.navigate("roadmap");
      uiEngine.render();
    });
  });

  document.getElementById("roadmap-select")?.addEventListener("change", e => {
    stateEngine.setState({ roadmapFocusId: e.target.value });
    uiEngine.render();
  });

  document.querySelectorAll("[data-rerun-history]").forEach(btn => {
    btn.addEventListener("click", () => {
      const h = stateEngine.getState().history.find(x => String(x.generatedAt) === btn.dataset.rerunHistory);
      if (!h) return;
      stateEngine.setState({ query: h.query, budget: h.budget, country: h.country, activeCategory: h.category });
      routingEngine.navigate("dashboard");
      triggerAnalysis(h.query);
    });
  });

  document.querySelectorAll("[data-pricing-cta]").forEach(btn => {
    btn.addEventListener("click", () => {
      analyticsEngine.track("pricingViewed", { tier: btn.dataset.pricingCta });
      if (btn.dataset.pricingCta === "free") return;
      stateEngine.setState({ activeModal: { type: "waitlist" } });
      uiEngine.render();
    });
  });

  document.getElementById("waitlist-submit")?.addEventListener("click", () => {
    const emailInput = document.getElementById("waitlist-email");
    const email = emailInput?.value?.trim();
    if (!email || !email.includes("@")) {
      emailInput?.focus();
      return;
    }
    const list = storageEngine.get("oc_waitlist").data.value || [];
    storageEngine.set("oc_waitlist", [...list, { email, ts: Date.now() }]);
    stateEngine.setState({ activeModal: null, notification: { message: "Saved locally — no backend is connected yet.", tone: "success" } });
    uiEngine.render();
    setTimeout(() => { stateEngine.setState({ notification: null }); uiEngine.render(); }, 3500);
  });

  document.querySelectorAll("[data-modal-close]").forEach(btn => {
    btn.addEventListener("click", () => { stateEngine.setState({ activeModal: null }); uiEngine.render(); });
  });
  document.querySelectorAll("[data-modal-backdrop]").forEach(el => {
    el.addEventListener("click", e => { if (e.target === el) { stateEngine.setState({ activeModal: null }); uiEngine.render(); } });
  });

  document.querySelectorAll("[data-accordion-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.accordionToggle;
      const body = document.querySelector(`[data-accordion-body="${id}"]`);
      const icon = document.querySelector(`[data-accordion-icon="${id}"]`);
      const isOpen = !body.classList.contains("hidden");
      body.classList.toggle("hidden");
      icon.style.transform = isOpen ? "rotate(0deg)" : "rotate(180deg)";
      btn.setAttribute("aria-expanded", String(!isOpen));
    });
  });
}

function triggerAnalysis(forcedQuery) {
  const s = stateEngine.getState();
  const query = forcedQuery ?? document.getElementById("query-input")?.value ?? s.query;
  stateEngine.setState({ isAnalyzing: true, query });
  uiEngine.render();

  analyticsEngine.track("searchPerformed", { query, budget: s.budget, country: s.country, category: s.activeCategory });

  // simulate a short async compute step so skeleton loaders are meaningful
  setTimeout(() => {
    const result = simulationEngine.runAnalysis({ query, budget: s.budget, country: s.country, category: s.activeCategory }).data;
    storageEngine.pushCapped("recentSearches", query, CONFIG.limits.recentSearches);
    storageEngine.pushCapped("history", result, CONFIG.limits.history, "generatedAt");
    stateEngine.setState({
      isAnalyzing: false,
      lastResult: result,
      recentSearches: (storageEngine.get("recentSearches").data.value || []).filter(Boolean),
      history: storageEngine.get("history").data.value || []
    });
    uiEngine.render();
  }, 350);
}

function toggleBookmark(id) {
  const s = stateEngine.getState();
  if (!s.lastResult) return;
  const rec = s.lastResult.recommendations.find(r => r.id === id) || s.bookmarks.find(r => r.id === id);
  if (!rec) return;
  const exists = s.bookmarks.some(b => b.id === id);
  const nextBookmarks = exists ? s.bookmarks.filter(b => b.id !== id) : [rec, ...s.bookmarks];
  storageEngine.set("bookmarks", nextBookmarks);
  stateEngine.setState({ bookmarks: nextBookmarks });
  if (!exists) analyticsEngine.track("bookmarkAdded", { id });
  uiEngine.render();
}

/* ==================================================================
   INITIALIZATION
   ================================================================== */
function init() {
  themeEngine.init();
  routingEngine.init();
  const country = storageEngine.get("country").data.value || "India";
  const recentSearches = (storageEngine.get("recentSearches").data.value || []).filter(Boolean);
  const history = storageEngine.get("history").data.value || [];
  const bookmarks = storageEngine.get("bookmarks").data.value || [];
  stateEngine.setState({ country, recentSearches, history, bookmarks });
  stateEngine.subscribe(() => {}); // reserved for future cross-module reactions
  uiEngine.render();
}

document.addEventListener("DOMContentLoaded", init);
</script>
